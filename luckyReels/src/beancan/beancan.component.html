<div class="bomb-column">
    <div class="bomb-container" #bombElement>
        <img class="bomb" src="bomb.png" *ngIf="!isExploded" alt="Bomb">
        <img class="exploded-bomb" src="Explosion.png" *ngIf="isExploded" alt="Exploded Bomb">
    </div>

    <div style="display: flex; align-items: center; gap: 10px;">
        <mat-slider min="0" max="100" step="1">
            <input matSliderThumb [(ngModel)]="userInput">
        </mat-slider>
        <p style="color: white;">{{userInput}}%</p>
    </div>
    
    <mat-checkbox [(ngModel)]="isReverse">
        Reverse
    </mat-checkbox>

    <button mat-raised-button color="primary" (click)="generateRandomNumber()" [disabled]="isAnimating">
        {{ isAnimating ? 'Rolling...' : 'Roll' }}
    </button>

    <div *ngIf="generatedNumber !== null" class="result-box">
        <p><strong>Your Number:</strong> {{ userNumber }}</p>
        <p><strong>Generated Number:</strong> {{ showNumber }}</p>
        <p><strong>Result:</strong> {{ resultMessage }}</p>
    </div>
</div>
