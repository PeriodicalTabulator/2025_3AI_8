<input
  type="number"
  [(ngModel)]="userInput"
  min="1"
  max="99"
  class="number-input"
  placeholder="Pick a number (1–99)" />


<mat-checkbox [(ngModel)]="isReverse">
  Reverse
</mat-checkbox>


<button mat-raised-button color="primary" (click)="generateRandomNumber()">
  Roll
</button>


<div *ngIf="generatedNumber !== null" class="result-box">
  <p><strong>Generated Number:</strong> {{ generatedNumber }}</p>
  <p><strong>Your Number:</strong> {{ userNumber }}</p>
  <p><strong>Result:</strong> {{ resultMessage }}</p>
</div>

<p>Winning conditions:</p>

<p><b>Normal:</b> If player hits a number bellow chosen number, player wins.</p>
<p><b>Reversed:</b> If player hits a number above chosen number, player wins.</p>
