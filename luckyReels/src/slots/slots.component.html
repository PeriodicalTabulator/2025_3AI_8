
<div>
<div class="number-column">
  <div class="backgroundSlots">
   <div class="number-display-container">

    <div class="wing left-wing">
      <img src="leftwing.png" alt="Left Wing" />
    </div>

    <div class="slot-window">
      <div class="slot-reel" #reel1>
        <div *ngFor="let fruit of fruitsList" class="slot-number">
          <img [src]="fruit.imgPath" [alt]="'Fruit ' + fruit.id" />
        </div>
      </div>
    </div>
    <div class="slot-window">
      <div class="slot-reel" #reel2>
        <div *ngFor="let fruit of fruitsList" class="slot-number">
          <img [src]="fruit.imgPath" [alt]="'Fruit ' + fruit.id" />
        </div>
      </div>
    </div>
    <div class="slot-window">
      <div class="slot-reel" #reel3>
        <div *ngFor="let fruit of fruitsList" class="slot-number">
          <img [src]="fruit.imgPath" [alt]="'Fruit ' + fruit.id" />
        </div>
      </div>
    </div>

    <div class="wing right-wing">
      <img src="rightwing.png" alt="Right Wing" />
    </div>
  </div>

  <div class="input-button-container">
     <p>Bet is 0.5€</p>
    <button (click)="spin()" mat-raised-button color="primary" [disabled]="disableButton">Spin</button>
    <ng-template #youWonDialog><p style="text-align: center;">{{ youWon }}</p></ng-template>
    <ng-template #startGame><p *ngIf="this.youWon === '' else youWonDialog" style="text-align: center;">Click spin to start a game</p></ng-template>
    <p *ngIf="this.disableButton else startGame">Spinning</p>
  </div>
</div>
</div>
</div>
